[pytest]
# Pytest configuration for AstroBot testing

# Test paths
testpaths =
    testing/backend
    testing/integration

# Test discovery patterns
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    unit: marks tests as unit tests (fast)
    integration: marks tests as integration tests (slower)
    slow: marks tests as slow running
    auth: marks tests as authentication related
    chat: marks tests as chat functionality related
    document: marks tests as document processing related
    rag: marks tests as RAG pipeline related
    provider: marks tests as LLM provider related

# Timeout for tests (in seconds)
timeout = 300

# Minimum Python version
python_version = 3.10

# Coverage options
[coverage:run]
branch = True
omit =
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstract
