# Nginx Reverse Proxy Configuration for AstroBot FastAPI Load Balancing
# This configuration distributes requests across multiple FastAPI instances

upstream fastapi_backend {
    # Least connections algorithm - distributes load based on active connections
    least_conn;

    # Backend FastAPI instances
    server fastapi-1:8000 max_fails=3 fail_timeout=30s;
    server fastapi-2:8000 max_fails=3 fail_timeout=30s;
    server fastapi-3:8000 max_fails=3 fail_timeout=30s;

    # Enable keepalive for better connection reuse
    keepalive 32;
}

# Redirect HTTP to HTTPS (optional - uncomment for production)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# Main server block
server {
    listen 80;
    # listen 443 ssl http2;  # Uncomment for HTTPS
    server_name localhost;

    # SSL Certificate configuration (uncomment for production)
    # ssl_certificate /etc/nginx/certs/astrobot.crt;
    # ssl_certificate_key /etc/nginx/certs/astrobot.key;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;

    # Buffer sizes for large uploads
    client_max_body_size 100M;
    client_body_buffer_size 10M;

    # Request timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    # Logging
    access_log /var/log/nginx/astrobot_access.log combined;
    error_log /var/log/nginx/astrobot_error.log warn;

    # Health check endpoint (lightweight, doesn't require auth)
    location /api/health {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # More aggressive timeout for health checks
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;

        access_log off;  # Don't log health checks
    }

    # API endpoints
    location /api/ {
        proxy_pass http://fastapi_backend;

        # HTTP version for better performance
        proxy_http_version 1.1;

        # Connection pooling
        proxy_set_header Connection "";

        # Headers for proxying
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;

        # Buffering settings for large responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 512k;
        proxy_busy_buffers_size 512k;

        # Redirect handling
        proxy_redirect off;
    }

    # FastAPI docs (optional - disable in production)
    location /docs {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Static files (if any)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers (if needed)
    # add_header Access-Control-Allow-Origin "*" always;
    # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Content-Type, X-User-ID, X-Username" always;
}
