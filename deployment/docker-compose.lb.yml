version: '3.8'

# AstroBot Load Balanced Deployment with Nginx
# Run with: docker-compose -f docker-compose.lb.yml up -d

services:
  # Nginx Reverse Proxy / Load Balancer
  nginx:
    image: nginx:latest
    container_name: astrobot-nginx
    ports:
      - "80:80"
      - "443:443"  # For HTTPS (requires SSL certs)
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL certificates
      # - ./deployment/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - fastapi-1
      - fastapi-2
      - fastapi-3
    networks:
      - astrobot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI Instance 1
  fastapi-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrobot-fastapi-1
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/astrobot.db
      - LOG_LEVEL=INFO
      - SENTRY_ENVIRONMENT=production
      # Add your other env vars here
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - astrobot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI Instance 2
  fastapi-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrobot-fastapi-2
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/astrobot.db
      - LOG_LEVEL=INFO
      - SENTRY_ENVIRONMENT=production
      # Add your other env vars here
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - astrobot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI Instance 3
  fastapi-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrobot-fastapi-3
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/astrobot.db
      - LOG_LEVEL=INFO
      - SENTRY_ENVIRONMENT=production
      # Add your other env vars here
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - astrobot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Redis for distributed rate limiting
  # Uncomment if using Redis backend for rate limiting
  # redis:
  #   image: redis:7-alpine
  #   container_name: astrobot-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - astrobot-network
  #   restart: unless-stopped

networks:
  astrobot-network:
    driver: bridge

volumes:
  nginx_logs:
  # redis_data:  # Uncomment if using Redis

# Notes:
# - All FastAPI instances share the same data volume (data/)
# - SQLite WAL mode handles concurrent access safely
# - ChromaDB persists in shared data/chroma_db/ directory
# - Logs aggregated in shared logs/ directory
# - Access the app at http://localhost/api/
# - Health check endpoint: http://localhost/api/health
#
# To scale to more instances:
# 1. Add more fastapi-N services (copy fastapi-1 block)
# 2. Update nginx.conf upstream block with new server entries
# 3. Restart nginx service
#
# For production:
# - Add SSL certificates to deployment/certs/
# - Update nginx.conf with SSL configuration (uncomment lines)
# - Use environment-specific .env files
# - Configure proper logging aggregation
# - Set up monitoring/alerting for all instances
