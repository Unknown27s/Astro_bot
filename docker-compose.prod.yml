version: '3.9'
services:
  chromadb:
    image: chromadb/chroma:0.4.22
    container_name: astrobot-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "true"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    networks:
      - astrobot-net

  astrobot-api:
    image: astrobot-api:latest
    container_name: astrobot-api
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - DEBUG=false
      - LOG_LEVEL=WARNING
    depends_on:
      chromadb:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - astrobot-net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  astrobot-backend:
    image: astrobot-backend:latest
    container_name: astrobot-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHON_API_URL=http://astrobot-api:8000
      - JAVA_OPTS=-Xmx1g -XX:+UseG1GC
    depends_on:
      astrobot-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - astrobot-net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  astrobot-frontend:
    image: astrobot-frontend:latest
    container_name: astrobot-frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://astrobot-backend:8080
    depends_on:
      astrobot-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - astrobot-net
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  chroma_data:
    driver: local

networks:
  astrobot-net:
    driver: bridge
